# Build and test the C port, produce release binaries for multiple platforms
name: C Build

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
          - os: ubuntu-24.04-arm
            artifact: linux-arm64
          - os: macos-latest
            artifact: macos-arm64
          - os: windows-latest
            artifact: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Test harness needs python3.12 to run the Python oracle side-by-side
      # (run_zxbpp_tests.sh, run_zxbasm_tests.sh — both Unix AND Windows).
      # Strict — falls over loudly if the interpreter is missing.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure CMake
        run: cmake -S csrc -B csrc/build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build csrc/build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build csrc/build --config Release -j $env:NUMBER_OF_PROCESSORS

      # Production layout sanity — the multicall binary and its three
      # applet entries (zxbpp / zxbasm / zxbc) must be present under
      # bin/ and runnable. Tests below invoke via these names, proving
      # the shipping path, not a side-built standalone.
      - name: Verify multicall layout (Unix)
        if: runner.os != 'Windows'
        run: |
          test -x csrc/build/bin/zxbasic-suite
          test -L csrc/build/bin/zxbpp
          test -L csrc/build/bin/zxbasm
          test -L csrc/build/bin/zxbc
          ./csrc/build/bin/zxbpp --help >/dev/null
          ./csrc/build/bin/zxbasm --help >/dev/null
          ./csrc/build/bin/zxbasic-suite zxbpp --help >/dev/null

      - name: Verify multicall layout (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          test -x csrc/build/bin/Release/zxbasic-suite.exe
          test -f csrc/build/bin/Release/zxbpp.exe
          test -f csrc/build/bin/Release/zxbasm.exe
          test -f csrc/build/bin/Release/zxbc.exe

      - name: Run zxbpp tests (Unix)
        if: runner.os != 'Windows'
        run: ./csrc/tests/run_zxbpp_tests.sh ./csrc/build/bin/zxbpp tests/functional/zxbpp

      - name: Run zxbasm tests (Unix)
        if: runner.os != 'Windows'
        run: ./csrc/tests/run_zxbasm_tests.sh ./csrc/build/bin/zxbasm tests/functional/asm

      # Unit tests now share bin/ with the production tools (single
      # runtime output dir). ctest is the canonical runner; this step
      # invokes it directly so failures are wired into the workflow's
      # exit code rather than aggregated into a separate target.
      - name: Run unit tests (Unix)
        if: runner.os != 'Windows'
        run: cd csrc/build && ctest --output-on-failure

      # Note: csrc/tests/run_cmdline_tests.sh was deleted in Round 0
      # (Sprint 11) as a fuzzy harness. The 15 value-verifying cmdline
      # tests it ran are replaced by the test_cmdline C binary above.

      # zxbpp text tests skipped on Windows — #line paths differ.
      # Build verification is sufficient; text output is validated on Unix.

      - name: Run zxbasm tests (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./csrc/tests/run_zxbasm_tests.sh ./csrc/build/bin/Release/zxbasm.exe tests/functional/asm

      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cd csrc/build && ctest -C Release --output-on-failure

      # Ship the multicall binary as the release artifact. On Unix we
      # also include the three applet symlinks; tar preserves them.
      # On Windows the .exe is shipped under each applet name directly
      # (no symlink primitive — see csrc/multicall/CMakeLists.txt).
      - name: Stage release tree (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifact/bin
          cp -a csrc/build/bin/zxbasic-suite artifact/bin/
          cp -a csrc/build/bin/zxbpp artifact/bin/
          cp -a csrc/build/bin/zxbasm artifact/bin/
          cp -a csrc/build/bin/zxbc artifact/bin/

      - name: Stage release tree (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifact/bin
          cp csrc/build/bin/Release/zxbasic-suite.exe artifact/bin/
          cp csrc/build/bin/Release/zxbpp.exe artifact/bin/
          cp csrc/build/bin/Release/zxbasm.exe artifact/bin/
          cp csrc/build/bin/Release/zxbc.exe artifact/bin/

      - name: Upload zxbasic-suite (multicall + applets)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-zxbasic-suite
          path: artifact/bin

  # Compare against Python ground truth (single platform is sufficient)
  python-comparison:
    name: Python Ground Truth
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build C binary
        run: |
          cmake -S csrc -B csrc/build -DCMAKE_BUILD_TYPE=Release
          cmake --build csrc/build -j$(nproc)

      - name: Compare Python vs C output (zxbpp)
        run: ./csrc/tests/compare_python_c.sh ./csrc/build/bin/zxbpp tests/functional/zxbpp

      - name: Compare Python vs C output (zxbasm)
        run: ./csrc/tests/compare_python_c_asm.sh ./csrc/build/bin/zxbasm tests/functional/asm

  # Create release binaries when a tag is pushed
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test, python-comparison]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package binaries
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            # Each artefact dir contains the multicall binary plus the
            # three applet entries (symlinks on Unix, copies on Windows).
            # tar preserves symlinks; --dereference would explode them.
            tar czf "${name}.tar.gz" -C "$dir" .
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
